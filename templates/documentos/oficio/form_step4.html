{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">

  <div class="mb-4">
    <h4 class="fw-bold">{{ page_title }}</h4>
    <p class="text-muted">{{ wizard_page_title }}</p>
  </div>

  <div class="d-flex gap-3 mb-4">
    {% for step in wizard_steps %}
    <div class="d-flex align-items-center gap-1">
      <span class="badge rounded-pill {% if step.step == current_step %}bg-primary{% elif step.step < current_step %}bg-success{% else %}bg-secondary{% endif %}">
        {{ step.step }}
      </span>
      <span class="small {% if step.step == current_step %}fw-semibold{% else %}text-muted{% endif %}">
        {{ step.label }}
      </span>
    </div>
    {% if not forloop.last %}<div class="text-muted">›</div>{% endif %}
    {% endfor %}
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h5 class="card-title">{{ wizard_page_title }}</h5>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Observações finais</label>
          <textarea name="observacoes" class="form-control" rows="4"
                    placeholder="Informações adicionais para o ofício..."></textarea>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a href="{% url 'oficio_step3' %}" class="btn btn-outline-secondary">Voltar</a>
          <a href="{% url 'oficio_justificativa' %}" class="btn btn-primary">Próximo</a>
        </div>
      </form>
    </div>
  </div>

</div>
</div>
{% endblock %}
