{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">

  <div class="mb-4">
    <h4 class="fw-bold">{{ page_title }}</h4>
    <p class="text-muted">{{ wizard_page_title }}</p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h5 class="card-title">{{ wizard_page_title }}</h5>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Justificativa da viagem</label>
          <textarea name="justificativa" class="form-control" rows="6"
                    placeholder="Descreva a justificativa para a realização desta viagem..."></textarea>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a href="{% url 'oficio_step4' %}" class="btn btn-outline-secondary">Voltar</a>
          <a href="{% url 'oficio_resumo' %}" class="btn btn-primary">Próximo</a>
        </div>
      </form>
    </div>
  </div>

</div>
</div>
{% endblock %}
